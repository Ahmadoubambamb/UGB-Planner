<div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
<h1 style="font-size:22px;font-weight:700;color:#534AB7">Gestion des Cours</h1>
<button class="btn-ugb" (click)="openCreate()">+ Nouveau Cours</button>
</div>
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
@for (c of coursList(); track c.id) {
<div style="background:white;border-radius:12px;padding:20px;
border:1px solid #E5E7EB;box-shadow:0 1px 4px rgba(0,0,0,0.05)">
<div style="display:flex;justify-content:space-between;align-items:flex-start">
<h3 style="font-size:15px;font-weight:600;margin-bottom:6px">{{ c.intitule }}</h3>
<div style="display:flex;gap:8px">
<button (click)="openEdit(c)"
style="background:none;border:none;color:#534AB7;cursor:pointer"> </button>
<button (click)="delete(c.id)"
style="background:none;border:none;color:#EF4444;cursor:pointer"> </button>
</div>
</div>
<p style="color:#6B7280;font-size:13px;margin-bottom:12px">{{ c.code }}</p>
<span style="background:#534AB7;color:white;padding:4px 12px;
border-radius:20px;font-size:12px;font-weight:600">
{{ c.credits }} credits</span>
</div>
}
</div>
<!-- MODAL COURS -->
@if (showModal()) {
<div class="modal-overlay" (click)="showModal.set(false)">
<div class="modal-box" style="width:460px" (click)="$event.stopPropagation()">
<div class="modal-header">
<h3>{{ editMode() ? 'Modifier' : 'Nouveau' }} Cours</h3>
<button class="modal-close" (click)="showModal.set(false)">x</button>
</div>
<div class="form-group" style="margin-bottom:16px">
<label>Nom du cours</label>
<input [value]="form().intitule"
(input)="set('intitule',$any($event.target).value)" />
</div>
<div class="form-group" style="margin-bottom:16px">
<label>Code du cours</label>
<input [value]="form().code" placeholder="INF201"
(input)="set('code',$any($event.target).value)" />
</div>
<div class="form-group" style="margin-bottom:24px">
<label>Credits</label>
<input type="number" [value]="form().credits"
(input)="set('credits',+$any($event.target).value)" />
</div>
<div style="display:flex;justify-content:flex-end;gap:12px">
<button (click)="showModal.set(false)" style="padding:10px 20px;
border:1px solid #E5E7EB;border-radius:8px;background:white;cursor:pointer">Annuler</button>
<button class="btn-ugb" (click)="save()">
{{ editMode() ? 'Enregistrer' : 'Creer' }}</button>
</div>
</div>
</div>
}
</div>
