<div style="min-height:100vh;background:#F9FAFB;display:flex;
align-items:center;justify-content:center">
<div style="background:white;border-radius:16px;padding:48px;
width:480px;box-shadow:0 4px 24px rgba(0,0,0,0.08)">
<!-- Icone + Titre -->
<div style="text-align:center;margin-bottom:32px">
<div style="font-size:48px;color:#534AB7;margin-bottom:12px"> </div>
<h1 style="color:#534AB7;font-size:22px;font-weight:700">UGB Planner Admin</h1>
</div>
@if (erreur()) {
<div style="background:#FEE2E2;color:#B91C1C;padding:12px;
border-radius:8px;margin-bottom:16px;font-size:14px">
{{ erreur() }}</div>
}
<div class="form-group" style="margin-bottom:16px">
<label>Email</label>
<input type="email" [value]="email()"
(input)="email.set($any($event.target).value)"
placeholder="admin@ugb.sn" />
</div>
<div class="form-group" style="margin-bottom:24px">
<label>Password</label>
<input type="password" [value]="password()"
(input)="password.set($any($event.target).value)" />
</div>
<button class="btn-ugb" style="width:100%;justify-content:center;padding:14px"
(click)="login()" [disabled]="loading()">
@if (loading()) { Connexion... } @else {  Login }
</button>
</div>
</div>
