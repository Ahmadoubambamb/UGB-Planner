<!-- Page Connexion -->
<div class="min-vh-100 d-flex align-items-center justify-content-center"
     style="background: linear-gradient(135deg, #185FA5 0%, #0C447C 100%)">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">

        <!-- Logo -->
        <div class="text-center mb-4">
          <i class="bi bi-calendar3 text-white" style="font-size:3rem"></i>
          <h2 class="text-white fw-bold mt-2">EduPlan</h2>
          <p class="text-white opacity-75">Espace administrateur</p>
        </div>

        <!-- Carte formulaire -->
        <div class="card border-0 shadow-lg">
          <div class="card-body p-4">

            <h5 class="fw-semibold mb-4 text-center" style="color:#185FA5">
              <i class="bi bi-lock me-2"></i>Connexion
            </h5>

            <!-- Message erreur -->
            @if (erreur) {
              <div class="alert alert-danger d-flex align-items-center gap-2 py-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ erreur }}</span>
              </div>
            }

            <!-- Formulaire -->
            <div class="mb-3">
              <label class="form-label fw-medium">Email</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-envelope text-muted"></i>
                </span>
                <input
                  type="email"
                  class="form-control border-start-0 ps-0"
                  placeholder="admin@eduplan.sn"
                  [(ngModel)]="email"
                  (keyup.enter)="seConnecter()"
                />
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-medium">Mot de passe</label>
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">
                  <i class="bi bi-key text-muted"></i>
                </span>
                <input
                  type="password"
                  class="form-control border-start-0 ps-0"
                  placeholder="••••••••"
                  [(ngModel)]="motDePasse"
                  (keyup.enter)="seConnecter()"
                />
              </div>
            </div>

            <!-- Bouton -->
            <button
              class="btn w-100 text-white fw-semibold py-2"
              style="background:#185FA5"
              (click)="seConnecter()"
              [disabled]="chargement">
              @if (chargement) {
                <span class="spinner-border spinner-border-sm me-2"></span>
                Connexion en cours...
              } @else {
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
              }
            </button>

          </div>
        </div>

        <!-- Retour accueil -->
        <div class="text-center mt-3">
          <a routerLink="/accueil" class="text-white opacity-75 text-decoration-none small">
            <i class="bi bi-arrow-left me-1"></i>Retour à l'accueil
          </a>
        </div>

      </div>
    </div>
  </div>

</div>
